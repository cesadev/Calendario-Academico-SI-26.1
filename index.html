<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma Acadêmico SI 26.1</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Cronograma Acadêmico SI 26.1</h1>
            <p id="current-date"></p>
        </header>

        <nav class="filters">
            <button class="filter-btn active" data-filter="all">Geral</button>
            <button class="filter-btn" data-filter="IP">IP</button>
            <button class="filter-btn" data-filter="CAD">CAD</button>
            <button class="filter-btn" data-filter="SD">SD</button>
            <button class="filter-btn" data-filter="MD">MD</button>
        </nav>

        <div id="sub-menu" class="info-pill-container"></div>

        <main>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Dia</th>
                            <th>Disciplinas</th>
                            <th>Sala</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title"></h2>
            <div id="modal-info"></div>
            <div class="pendencias">
                <h3>Conteúdos e Notas</h3>
                <p id="modal-notes"></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
